<!DOCTYPE html>
<html lang="en">
<head>
    <title>DevReady | HR Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="dashboard-container">

    <header class="dashboard-header">
        <h1>DevReady HR Dashboard</h1>
        <a href="#" class="logout-btn">Logout</a>
    </header>

    <section class="welcome-section">
        <h2>Welcome HR</h2>
        <p>Assign onboarding tasks and monitor employee progress.</p>
    </section>

    <section class="dashboard-actions">

        <div class="card">
            <h3>Create Task</h3>
            <p>Assign a new onboarding task to employees.</p>
            <button class="primary-btn">Add Task</button>
        </div>

        <div class="card">
            <h3>View Employees</h3>
            <p>Check employee onboarding progress.</p>
            <button class="primary-btn">View List</button>
        </div>

        <div class="card">
            <h3>Task Progress</h3>
            <p>Monitor completed and pending tasks.</p>
            <button class="primary-btn">View Progress</button>
        </div>

    </section>

</div>

</body>
</html>
