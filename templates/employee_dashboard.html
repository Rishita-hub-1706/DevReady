<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #eef2f7; }
        .hero-section { background: linear-gradient(45deg, #007bff, #6610f2); color: white; padding: 60px 0; border-radius: 0 0 50px 50px; }
    </style>
</head>
<body>
    <div class="hero-section text-center">
        <h1>Welcome Back!</h1>
        <p>Your Employee Dashboard</p>
        <a href="/logout" class="btn btn-light btn-sm mt-2">Sign Out</a>
    </div>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0 p-4">
                    <h4>Personal Profile</h4>
                    <hr>
                    <p><strong>Employee ID:</strong> {{ session['user_id'] if session['user_id'] else 'EMPXXXX' }}</p>
                    <p><strong>Status:</strong> <span class="badge bg-success">Active</span></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
