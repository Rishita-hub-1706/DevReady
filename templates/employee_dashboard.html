<!DOCTYPE html>
<html lang="en">
<head>
    <title>DevReady | Employee Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="dashboard-container">

    <header class="dashboard-header">
        <h1>DevReady Employee Dashboard</h1>
        <a href="#" class="logout-btn">Logout</a>
    </header>

    <section class="welcome-section">
        <h2>Welcome</h2>
        <p>Complete your onboarding tasks assigned by HR.</p>
    </section>

    <section class="task-list">

        <div class="task-card">
            <input type="checkbox">
            <label>Submit ID Documents</label>
        </div>

        <div class="task-card">
            <input type="checkbox">
            <label>Install Company Software</label>
        </div>

        <div class="task-card">
            <input type="checkbox">
            <label>Complete Security Training</label>
        </div>

    </section>

</div>

</body>
</html>
