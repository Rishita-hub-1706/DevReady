<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
    <div class="container">
        <div class="login-card">
            <h1>DevReady</h1>
            <p class="tagline">Structured onboarding. Seamless transition.</p>

            <h2>Employee Login</h2>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}" style="color: red; margin-bottom: 10px;">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <input type="text" name="employee_id" placeholder="Employee ID" required>

                <input type="password" name="password" placeholder="Password" required>

                <button type="submit">Access Workspace</button>
            </form>

            <p class="info">Credentials provided by HR department</p>
        </div>
    </div>
    
</body>
</html>
